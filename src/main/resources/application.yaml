server:
  port: ${PORT:8080}
# http://localhost:8080/doc.html
logging:
  level:
    root: info

management:
  endpoints:
    web:
      exposure:
        include: 'health'

# 以下配置可被 Nacos 配置中心覆盖
# Nacos Data ID: ms-java-biz-prod.yaml (或根据 profile 变化)

spring:
  # 国际化配置
  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false
  # MongoDB - 将在 Nacos 配置中心配置
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/chat_memory_db}
  # PostgreSQL - 将在 Nacos 配置中心配置
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${PG_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${PG_USER:postgres}
    password: ${PG_PWD:postgres}
    hikari:
      keepalive-time: 10000     # 10秒发一次心跳保活
      max-lifetime: 60000       # 1分钟强制回收连接，防止被服务端因为版本不匹配或空闲导致的踢除
      connection-timeout: 30000 # 连接超时
      idle-timeout: 30000       # 空闲超时
      minimum-idle: 1
      maximum-pool-size: 10
  # Flyway 数据库迁移
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true  # 对已有数据库进行基线处理
    validate-on-migrate: true
    # --- 物理隔离：复用 Nacos 下发的配置，但建立独立连接 ---
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
    driver-class-name: org.postgresql.Driver
    connect-retries: 10
    connect-retries-interval: 3
    # 修复 PostgreSQL 16 + Flyway 10.x 的连接重置问题
    postgresql:
      transactional:
        lock: true  # 使用表级锁，对 PgBouncer 及不稳定网络更鲁棒
    execute-in-transaction: true
langchain4j:
  open-ai:
    chat-model:
      # 开启请求与响应日志
      log-requests: true
      log-responses: true
    # Embedding Model - 将在 Nacos 配置中心配置
    embedding-model:
      base-url: ${EMBEDDING_MODEL_URL:http://langchain4j.dev/demo/openai/v1}
      api-key: ${EMBEDDING_MODEL_APIKEY:demo}
      model-name: ${EMBEDDING_MODEL_NAME:text-embedding-3-small}

  # --- Ollama (已注释) ---
  # ollama:
  #   chat-model:
  #     base-url: http://192.168.31.201:11434
  #     model-name: qwen3:latest
  #     log-requests: true
  #     log-responses: true

  community:
    dashscope:
      chat-model:
        # 参考文档: https://bailian.console.aliyun.com/?productCode=p_efm&tab=model#/model-market/detail/qwen3?modelGroup=qwen3
        api-key: ${DASH_SCOPE_API_KEY}
        # 有效期至 2025-10-26 (tianyaqpzm)
        model-name: ${CHAT_MODEL_NAME:qwen-plus-2025-04-28}

  # PgVector - 将在 Nacos 配置中心配置
  vector-store:
    pgvector:
      host: ${PG_HOST:localhost}
      port: ${PG_PORT:5432}
      user: ${PG_USER:postgres}
      password: ${PG_PWD:postgres}
      database: ${PG_DB:postgres}
      table: ${PG_TABLE:embeddings}
      dimension: 1536
      use-index: false
      index-list-size: 100

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-your-256-bit-secret}
  security:
    ignore:
      urls:
        - /health
        - /actuator/health
        - /doc.html
        - /webjars/**
        - /v3/api-docs/**
  knowledge:
    upload-dir: ${KNOWLEDGE_UPLOAD_DIR:/tmp/ai_knowledge_uploads}