server:
  port: ${PORT:8080}
  tomcat:
    keep-alive-timeout: 120000   # 延长至 120s，为 VPN 抖动提供更大缓冲
    max-keep-alive-requests: -1  # SSE 流需要无限请求支持，防止连接被强制回收
# http://localhost:8080/doc.html
logging:
  level:
    root: info
    org.flywaydb: info  # 开启调试日志，能看清每一条执行的 SQL
management:
  endpoints:
    web:
      exposure:
        include: 'health'

# 以下配置可被 Nacos 配置中心覆盖
# Nacos Data ID: ms-java-biz-prod.yaml (或根据 profile 变化)

spring:
  # 异步请求超时设置 (SSE 长连接必须)
  mvc:
    async:
      request-timeout: 3600000  # 设置为 1 小时
  # 国际化配置
  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false
  # MongoDB - 将在 Nacos 配置中心配置
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/chat_memory_db}
  # PostgreSQL - 将在 Nacos 配置中心配置
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${PG_URL:jdbc:postgresql://localhost:5432/postgres?tcpKeepAlive=true&prepareThreshold=0&options=-c%20search_path=public&client_encoding=UTF8&connectTimeout=30&socketTimeout=60}
    username: ${PG_USER:postgres}
    password: ${PG_PWD:postgres}
    hikari:
      keepalive-time: 30000     # 恢复至 30秒（Hikari 要求的最小值），确保保活机制生效
      max-lifetime: 240000      # 进一步缩短至 4 分钟，防止连接在失效后仍被留在池中
      connection-timeout: 30000 # 连接超时
      idle-timeout: 30000       # 空闲超时
      minimum-idle: 0
      maximum-pool-size: 10
  # Flyway 数据库迁移
  flyway:
    enabled: false             # 彻底禁用 Spring Boot 的自动抢跑，防止启动冲突, 已移至 FlywayConfig 手动控制，监听 ApplicationReadyEvent 执行
    locations: classpath:db/migration
    # --- 独立连接配置 (由 FlywayConfig 读取) ---
    # options=-c search_path=public: 这是一个关键技巧。通过在 URL 中硬编码 search_path，Flyway 驱动会认为会话状态从未被修改过，
    # 从而跳过退出时的 restoreOriginalState 逻辑，在之前的事故中，正是这个还原逻辑在 Nacos 刷新或 PgBouncer 环境下触发了 EOFException 导致启动失败
    url: ${SPRING_FLYWAY_URL:jdbc:postgresql://tao-lan.122577.xyz:5432/postgres?prepareThreshold=0&tcpKeepAlive=true&connectTimeout=30&socketTimeout=0&options=-c%20statement_timeout=0%20-c%20search_path=public&reWriteBatchedInserts=true}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
    driver-class-name: org.postgresql.Driver
    connect-retries: 20
    connect-retries-interval: 5
    postgresql:
      transactional:
        lock: false  # 适配 PgBouncer 事务模式
    execute-in-transaction: true
langchain4j:
  open-ai:
    chat-model:
      # 开启请求与响应日志
      log-requests: true
      log-responses: true
    # Embedding Model - 将在 Nacos 配置中心配置
    embedding-model:
      base-url: ${EMBEDDING_MODEL_URL:http://langchain4j.dev/demo/openai/v1}
      api-key: ${EMBEDDING_MODEL_APIKEY:demo}
      model-name: ${EMBEDDING_MODEL_NAME:gemini-embedding-2}

  # --- Ollama (已注释) ---
  # ollama:
  #   chat-model:
  #     base-url: http://192.168.31.201:11434
  #     model-name: qwen3:latest
  #     log-requests: true
  #     log-responses: true

  community:
    dashscope:
      chat-model:
        # 参考文档: https://bailian.console.aliyun.com/?productCode=p_efm&tab=model#/model-market/detail/qwen3?modelGroup=qwen3
        api-key: ${DASH_SCOPE_API_KEY}
        # 有效期至 2025-10-26 (tianyaqpzm)
        model-name: ${CHAT_MODEL_NAME:qwen-plus-2025-04-28}

  # PgVector - 将在 Nacos 配置中心配置
  vector-store:
    pgvector:
      host: ${PG_HOST:localhost}
      port: ${PG_PORT:5432}
      user: ${PG_USER:postgres}
      password: ${PG_PWD:postgres}
      database: ${PG_DB:postgres}
      table: ${PG_TABLE:embeddings}
      dimension: 1536
      use-index: false
      index-list-size: 100

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-your-256-bit-secret}
  security:
    ignore:
      urls:
        - /health
        - /actuator/health
        - /doc.html
        - /error
        - /webjars/**
        - /v3/api-docs/**
        - /.well-known/**
        - /mcp/**
        - /sse/**
        - /rest/biz/v1/mcp-plugins/enabled
  knowledge:
    upload-dir: ${KNOWLEDGE_UPLOAD_DIR:/tmp/ai_knowledge_uploads}
  flyway:
    manual-trigger: true       # 手动触发开关，由 FlywayConfig.onApplicationReady 使用