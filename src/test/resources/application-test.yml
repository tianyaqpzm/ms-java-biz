spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  data:
    mongodb:
      uri: mongodb://localhost:27017/test
    redis:
      enabled: false
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

# 禁用 LangChain4j 自动连接
langchain4j:
  open-ai:
    chat-model:
      enabled: false
  ollama:
    chat-model:
      enabled: false

logging:
  level:
    root: WARN
    com.dark.aiagent: DEBUG
