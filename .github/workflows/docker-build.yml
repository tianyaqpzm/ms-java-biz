name: Build MS Java Biz DockerImage

on:
  push:
    branches:
      - master  # 主分支提交时触发
  pull_request:
    branches:
      - master  # 向主分支发起PR时触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # 若推送到GitHub Container Registry需要此权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3  # 必须添加，用于模拟多架构

      - name: Verify Secret is not empty
        run: |
          if [ -z "${{ secrets.MVN_DEPLOY_TOKEN }}" ]; then
            echo "❌ 致命错误：Secret 为空！请检查 Secret 名字是否拼错或层级不对。"
            exit 1
          else
            echo "✅ 成功：Secret 非空，已读取到。"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # cache: maven
          server-id: github
          # 这里的环境变量会自动注入到 actions/setup-java 生成的 settings.xml 中
        # ⚠️ 核心修复：这里填写的是自定义的环境变量“名称”，绝对不能填真实的值！
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Build with Maven
        # 执行命令时，不需要加 -s，它会自动去找刚才生成的配置
        run: mvn clean install -U
        env:
          # ⚠️ 核心修复：在这里，把真实的值注入到上面定义的环境变量里
          MAVEN_USERNAME: tianyaqpzm
          MAVEN_PASSWORD: ${{ secrets.MVN_DEPLOY_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 可选：登录到GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            tianyaqpzm/ms-java-biz
            ghcr.io/${{ github.repository_owner }}/ms-java-biz  # 可选
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short

      - name: Build and push Docker image
        id: docker_build  # 添加 ID
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64  # 多架构支持
          push: true  # 允许在PR时也推送镜像，配合上方 tags: type=ref,event=pr 使用
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'pull_request' && github.base_ref == 'master' && startsWith(github.head_ref, 'feature_'))
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.HOST }}
          username: ${{ secrets.VPS_USERNAME }} 
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ vars.PORT || 22 }}
          script: |
            # 停止并删除旧容器
            docker stop ms-java-biz || true
            docker rm ms-java-biz || true
            
            # 拉取最新镜像
            IMAGE_TAG=${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'master' }}
            docker pull tianyaqpzm/ms-java-biz:${IMAGE_TAG}
            # 需提前创建docker内部网络: pei-network
            # host-gateway 是 Docker 的魔法词，自动指向宿主机内网 IP
            # 启动新容器
            docker run -d \
              --name ms-java-biz \
              --restart unless-stopped \
              --network pei-network \
              --expose 8080 \
              --add-host "tao-lan.122577.xyz:host-gateway" \
              -e TZ=Asia/Shanghai \
              -e NACOS_SERVER_ADDR=${{ vars.NACOS_SERVER_ADDR }} \
              -e NACOS_NAMESPACE=${{ vars.NACOS_NAMESPACE }} \
              -e NACOS_USERNAME=${{ secrets.NACOS_USERNAME }} \
              -e NACOS_PASSWORD=${{ secrets.NACOS_PASSWORD }} \
              tianyaqpzm/ms-java-biz:${IMAGE_TAG}
            
            # 清理无用镜像
            docker image prune -af