name: Tests

on:
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # cache: maven
          server-id: github
          # 这里的环境变量会自动注入到 actions/setup-java 生成的 settings.xml 中
          server-username: ${{ github.actor }}
          server-password: ${{ secrets.MVN_DEPLOY_TOKEN }}
      - name: Run Tests
        run: mvn -B test
